# following https://www.snopekgames.com/tutorial/2021/how-host-nakama-server-10mo/ for info
name: nakama-production
data_dir: /nakama/data

# Server-to-server security
runtime:
  http_key: "${NAKAMA_RUNTIME_HTTP_KEY}"  # Set via environment variable
  path: /nakama/data/modules

# Client socket security
socket:
  server_key: "${NAKAMA_SOCKET_SERVER_KEY}"
  port: 7350

# Session security
session:
  token_expiry_sec: 21600  # 6 hours
  encryption_key: "${NAKAMA_SESSION_ENCRYPTION_KEY}"
  refresh_encryption_key: "${NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY}"

# Console security
console:
  username: "${NAKAMA_CONSOLE_USERNAME}"
  password: "${NAKAMA_CONSOLE_PASSWORD}"
  signing_key: "${NAKAMA_CONSOLE_SIGNING_KEY}"
  port: 7351

# Database
database:
  address:
    - "postgres:localdb@postgres:5432/nakama"

# Logging
logger:
  level: info
  stdout: true

# Metrics
metrics:
  prometheus_port: 9100